name: Scrape Marmitex Marisa

on:
  schedule:
    # 14:30 UTC = 11:30 BRT (horário de Brasília, sem horário de verão)
    - cron: '30 14 * * *'
  workflow_dispatch:  # permite rodar manualmente pelo site do GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necessário para fazer commit do cardapio.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install playwright pytz
          playwright install chromium
          playwright install-deps chromium

      - name: Rodar scraper
        run: python scraper.py

      - name: Commit cardapio.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cardapio.json
          git pull --rebase --autostash origin main
          git diff --staged --quiet || git commit -m "cardapio: $(date '+%Y-%m-%d %H:%M')"
          git push
